[tool.black]
line-length = 120
target-version = ["py310"]
include = "\\.pyi?$"
extend-exclude = '''
/(
    \.venv
  | venv
  | logs
  | __pycache__
)/
'''

[tool.ruff]
line-length = 120
target-version = "py310"
exclude = [
  ".venv",
  "venv",
  "logs",
  "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]
